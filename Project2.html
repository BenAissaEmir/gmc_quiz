<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Project2.css"/>
    <title>Calculator UI</title>
</head>
<body class="parent">

    <div id="result-box">
        <h3>Your Result</h3>
        <p id="result-text">0</p> <div class="num_box">
            <button class="box-par">1</button>
            <button class="box-par">2</button>
            <button class="box-par">3</button>
        </div>
        
        <div class="num_box">
            <button class="box-par">4</button>
            <button class="box-par">5</button>
            <button class="box-par">6</button>
        </div>
        
        <div class="num_box">
            <button class="box-par">7</button>
            <button class="box-par">8</button>
            <button class="box-par">9</button>
        </div>
        
        <div class="num_box">
            <button class="box-par">=</button>
            <button class="box-par">+</button>
            <button class="box-par">-</button>
        </div>
    </div>

    <script src="Project2.js"></script>
</body>
</html>
